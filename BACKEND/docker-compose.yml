services:
  postgres:
    image: postgres:15-alpine
    container_name: SI_postgres
    environment:
      POSTGRES_DB: system_internal_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: redis_cache
    ports:
      - "6379:6379" # Map cổng để IDE truy cập được vào localhost:6379

volumes:
  postgres_data: