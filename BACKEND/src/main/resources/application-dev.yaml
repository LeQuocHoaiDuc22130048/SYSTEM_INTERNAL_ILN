spring:
  application:
    name: system-internal-inl-backend-dev

  # 1. DATABASE CONFIGURATION (PostgreSQL in Docker)
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:system_internal_inl}?options=-c+timezone%3DAsia%2FHo_Chi_Minh
    username: ${DB_USER:admin}
    password: ${DB_PASSWORD:admin@123}
    driver-class-name: org.postgresql.Driver

  # 2. JPA / HIBERNATE CONFIGURATION
  jpa:
    hibernate:
      ddl-auto: update  # Development mode - update schema
    show-sql: true
    properties:
      hibernate:
        jdbc:
          timezone: Asia/Ho_Chi_Minh
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # 3. REDIS CONFIGURATION
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # 4. FILE UPLOAD
  servlet:
    multipart:
      max-file-size: 10MB  # Increased for development
      max-request-size: 10MB

# 5. SERVER CONFIGURATION
server:
  port: ${SERVER_PORT:8888}
  error:
    include-message: always
    include-stack-trace: always  # Show stack traces in development
    include-exception: true

# 6. LOGGING CONFIGURATION
logging:
  level:
    root: INFO
    com.suachuabientan.system_internal: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG

# 7. CUSTOM APP PROPERTIES
app:
  init:
    boss:
      username: ${BOSS_USER:boss}
      password: ${BOSS_PASS:boss@123}
      full-name: ${BOSS_FULL_NAME:"Đỗ Xuân Vỹ"}
    admin:
      username: ${ADMIN_USER:admin}
      password: ${ADMIN_PASS:admin@123}
      full-name: ${ADMIN_FULL_NAME:"Admin System"}
  jwt:
    secret: ${JWT_SECRET:49bd017fed0abe7d529c48151ca5c6b5c231610d6b1560c53e50bf48682e5ba6}
    expiration-ms: ${JWT_EXPIRATION_MS:604800000}

# 8. DEVELOPMENT SPECIFIC
dev:
  enabled: true
  hot-reload: true
  mock-external-services: false